<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Playground · SQLSENSEI</title>
  <meta name="description" content="Real SQLite in your browser. Preloaded with the SQLSENSEI dataset. Run any query, no setup." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='monospace' font-size='52' font-weight='700' fill='%23000'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    body { overflow: hidden; }
    body::after { display: none; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">SQ</span>
        <span>SQL<span class="brand-suffix">SENSEI</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="mindmap.html">Learn</a></li>
        <li><a href="practice.html">Practice</a></li>
        <li><a href="playground.html" class="active">Playground</a></li>
        <li><a href="interview.html">Interview</a></li>
        <li><a href="patterns.html">Patterns</a></li>
        <li><a href="cheatsheet.html">Cheatsheet</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="playground">

      <!-- ====== Sidebar ====== -->
      <aside class="pg-sidebar">
        <h3>📋 Schema</h3>
        <div id="pgSchema"></div>

        <h3>⚡ Quick snippets</h3>
        <div id="pgSnippets"></div>

        <h3>🕐 History</h3>
        <div id="pgHistory"></div>
      </aside>

      <!-- ====== Main ====== -->
      <section class="pg-main">
        <div class="pg-toolbar">
          <div class="pg-toolbar-info" id="pgStatus">
            <span class="badge badge-amber">
              <span class="badge-dot"></span> LOADING
            </span>
            <span>Starting SQLite engine…</span>
          </div>
          <div class="pg-toolbar-actions">
            <button class="btn btn-ghost btn-sm" id="pgFormat" title="Format SQL">🪄 Format</button>
            <button class="btn btn-ghost btn-sm" id="pgShare" title="Copy shareable link">🔗 Share</button>
            <button class="btn btn-ghost btn-sm" id="pgReset" title="Reset database">↺ Reset DB</button>
            <button class="btn btn-ghost btn-sm" id="pgClear">Clear</button>
            <button class="btn btn-primary btn-sm" id="pgRun">▶ Run <span style="opacity:0.6; font-family: var(--font-mono); font-size: 0.75rem;">(Ctrl+↵)</span></button>
          </div>
        </div>

        <div class="pg-editor-wrap">
          <textarea id="pgEditor" spellcheck="false" placeholder="-- Write your SQL here, then press Ctrl+Enter to run&#10;SELECT * FROM customers LIMIT 5;"></textarea>
        </div>

        <div class="pg-results" id="pgResults">
          <div class="pg-empty">
            <div class="pg-empty-icon">▶</div>
            <p>Write a query above and click Run.</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="toast-stack" id="toastStack"></div>

  <script src="assets/js/data/curriculum.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/playground.js"></script>
</body>
</html>
