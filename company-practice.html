<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Practice — Real Interview SQL by Company · SQLSENSEI</title>
  <meta name="description" content="150+ real SQL interview questions from Google, Amazon, Meta, Netflix, Apple, Microsoft, Uber, Airbnb, Stripe, LinkedIn. Filter by company, topic, difficulty. Write SQL in the editor, run + check." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='monospace' font-size='52' font-weight='700' fill='%23000'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    body { overflow: hidden; }
    body::after { display: none; }

    /* Layout: 3-column */
    .cp-app {
      display: grid;
      grid-template-columns: 220px 1fr 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "sidebar topbar topbar"
        "sidebar question editor";
      height: calc(100vh - 65px);
      background: var(--bg-0);
    }

    .cp-sidebar {
      grid-area: sidebar;
      background: var(--bg-1);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .cp-sidebar-section { padding: 14px; }
    .cp-sidebar h3 {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-400);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .cp-company {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--ink-300);
      cursor: pointer;
      transition: all 0.2s var(--ease);
      text-align: left;
      margin-bottom: 2px;
      font-family: var(--font-sans);
    }

    .cp-company:hover { background: var(--bg-2); color: var(--ink-100); }
    .cp-company.active {
      background: var(--bg-3);
      border-color: var(--co-color);
      color: var(--ink-100);
    }
    .cp-company.active .cp-company-name { color: var(--co-color); font-weight: 600; }

    .cp-company-emoji { font-size: 1rem; flex-shrink: 0; }
    .cp-company-name { flex: 1; font-size: 0.85rem; }
    .cp-company-count {
      background: var(--bg-3);
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--ink-400);
    }
    .cp-company.active .cp-company-count { background: var(--co-color); color: var(--bg-0); }

    .cp-q-list {
      border-top: 1px solid var(--line);
      padding: 12px 14px;
      flex: 1;
      overflow-y: auto;
    }

    .cp-q-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--ink-300);
      cursor: pointer;
      transition: all 0.15s var(--ease);
      text-align: left;
      margin-bottom: 2px;
      font-family: var(--font-sans);
    }

    .cp-q-item:hover { background: var(--bg-2); color: var(--ink-100); }
    .cp-q-item.active { background: var(--bg-3); color: var(--ink-100); border-color: var(--line-strong); }

    .cp-q-num { font-family: var(--font-mono); font-size: 0.65rem; color: var(--ink-500); flex-shrink: 0; min-width: 20px; }
    .cp-q-title { flex: 1; font-size: 0.75rem; line-height: 1.3; }
    .cp-q-co { font-size: 0.85rem; flex-shrink: 0; }
    .cp-q-diff {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .cp-q-diff.diff-easy { background: rgba(52,211,153,0.15); color: var(--emerald-400); }
    .cp-q-diff.diff-medium { background: rgba(251,191,36,0.15); color: var(--amber-400); }
    .cp-q-diff.diff-hard { background: rgba(251,113,133,0.15); color: var(--rose-400); }

    /* TOP BAR — filter chips */
    .cp-topbar {
      grid-area: topbar;
      background: var(--bg-1);
      border-bottom: 1px solid var(--line);
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cp-filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cp-filter-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-400);
      margin-right: 6px;
      flex-shrink: 0;
      min-width: 50px;
    }

    .cp-chip {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      color: var(--ink-300);
      font-family: var(--font-sans);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s var(--ease);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .cp-chip:hover { background: var(--bg-3); color: var(--ink-100); }
    .cp-chip.active {
      background: var(--cyan-400);
      color: var(--bg-0);
      border-color: var(--cyan-400);
      font-weight: 600;
    }
    .cp-chip:disabled { opacity: 0.3; cursor: not-allowed; }

    .cp-chip-count {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .cp-chip-diff.diff-easy.active { background: var(--emerald-400); border-color: var(--emerald-400); }
    .cp-chip-diff.diff-medium.active { background: var(--amber-400); border-color: var(--amber-400); }
    .cp-chip-diff.diff-hard.active { background: var(--rose-400); border-color: var(--rose-400); }

    /* QUESTION PANEL */
    .cp-question {
      grid-area: question;
      overflow-y: auto;
      background: var(--bg-0);
      border-right: 1px solid var(--line);
      padding: 22px 26px;
    }

    .pgs-q-breadcrumb {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-400);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .pgs-q-h {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink-100);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .pgs-q-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .pgs-tag {
      padding: 3px 9px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      background: var(--bg-2);
      color: var(--ink-300);
      border: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pgs-tag-diff.diff-easy { background: rgba(52,211,153,0.1); color: var(--emerald-400); border-color: rgba(52,211,153,0.3); }
    .pgs-tag-diff.diff-medium { background: rgba(251,191,36,0.1); color: var(--amber-400); border-color: rgba(251,191,36,0.3); }
    .pgs-tag-diff.diff-hard { background: rgba(251,113,133,0.1); color: var(--rose-400); border-color: rgba(251,113,133,0.3); }

    .pgs-q-prompt {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-left: 3px solid var(--cyan-400);
      padding: 14px 18px;
      border-radius: 10px;
      color: var(--ink-100);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .pgs-q-prompt code {
      background: var(--bg-3);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.85em;
      color: var(--amber-300);
    }

    .pgs-q-tables-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--cyan-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .pgs-table-preview {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }

    .pgs-table-preview summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--ink-200);
      list-style: none;
    }

    .pgs-table-preview summary::-webkit-details-marker { display: none; }
    .pgs-table-preview summary::before {
      content: '▸';
      color: var(--ink-500);
      margin-right: 8px;
      display: inline-block;
      transition: transform 0.15s;
    }
    .pgs-table-preview[open] summary::before { transform: rotate(90deg); }

    .pgs-table-name { color: var(--cyan-400); font-weight: 600; }
    .pgs-table-meta { font-size: 0.65rem; color: var(--ink-500); }

    .pgs-q-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    /* EDITOR PANEL */
    .cp-editor-panel {
      grid-area: editor;
      display: flex;
      flex-direction: column;
      background: var(--bg-1);
      overflow: hidden;
    }

    .cp-editor-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--bg-0);
      gap: 8px;
      flex-wrap: wrap;
    }

    .cp-editor-toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-300);
    }

    .cp-editor-toolbar-right { display: flex; gap: 6px; }

    #cpEditor {
      flex: 1;
      min-height: 180px;
      max-height: 40%;
      background: var(--bg-0);
      border: none;
      padding: 14px 18px;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--ink-100);
      resize: none;
      outline: none;
    }
    #cpEditor:focus { box-shadow: none; }

    .pgs-solution {
      background: var(--bg-2);
      border-top: 1px solid var(--line);
      padding: 12px 18px;
    }
    .pgs-solution-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--emerald-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .pgs-result-panel {
      flex: 1;
      overflow: auto;
      background: var(--bg-1);
      border-top: 1px solid var(--line);
      padding: 14px 18px;
    }

    .pgs-result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .pgs-result-status {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
    }
    .pgs-result-status.success { color: var(--emerald-400); }
    .pgs-result-status.error { color: var(--rose-400); }

    .pgs-result-meta { font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink-500); }

    .pgs-result-table {
      max-height: 100%;
      overflow: auto;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .pgs-result-table table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      background: var(--bg-0);
    }
    .pgs-result-table th, .pgs-result-table td {
      padding: 5px 12px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    .pgs-result-table th {
      background: var(--bg-2);
      color: var(--cyan-400);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: sticky;
      top: 0;
    }

    .pgs-result-error {
      padding: 10px 14px;
      background: rgba(251, 113, 133, 0.08);
      border: 1px solid rgba(251, 113, 133, 0.25);
      border-radius: 8px;
      color: var(--rose-400);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      white-space: pre-wrap;
    }

    .pgs-result-empty {
      text-align: center;
      padding: 36px 20px;
      color: var(--ink-400);
    }
    .pgs-result-empty-icon {
      width: 44px; height: 44px;
      margin: 0 auto 10px;
      background: var(--bg-2);
      border-radius: 12px;
      display: grid; place-items: center;
      color: var(--cyan-400);
      font-size: 1.1rem;
    }

    .pgs-result-running {
      color: var(--ink-300);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 14px;
    }

    .pgs-banner {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .pgs-banner-pass {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-left: 4px solid var(--emerald-400);
      color: var(--emerald-400);
    }
    .pgs-banner-fail {
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-left: 4px solid var(--amber-400);
      color: var(--amber-200, #fde68a);
    }

    .pgs-btn-check {
      background: linear-gradient(135deg, var(--emerald-400), #16a34a);
      color: var(--bg-0);
      border: none;
      font-weight: 600;
    }
    .pgs-btn-check:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px -2px rgba(52,211,153,0.5);
      color: var(--bg-0);
    }
    .pgs-btn-run {
      background: linear-gradient(135deg, var(--cyan-500), var(--cyan-600));
      color: var(--bg-0);
      border: none;
    }
    .pgs-btn-run:hover {
      transform: translateY(-1px);
      color: var(--bg-0);
    }

    .ex-loading {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--ink-500);
      border-top-color: var(--cyan-400);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1100px) {
      .cp-app {
        grid-template-columns: 200px 1fr;
        grid-template-areas:
          "sidebar topbar"
          "sidebar question";
      }
      .cp-editor-panel { display: none; }
    }
    @media (max-width: 700px) {
      .cp-app { grid-template-columns: 1fr; grid-template-areas: "topbar" "question"; }
      .cp-sidebar { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">SQ</span>
        <span>SQL<span class="brand-suffix">SENSEI</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="mindmap.html">Learn</a></li>
        <li><a href="practice.html">Practice</a></li>
        <li><a href="company-practice.html" class="active">By Company</a></li>

        <li><a href="interview.html">Interview</a></li>
        <li><a href="cheatsheet.html">Cheatsheet</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="cp-app">

      <!-- LEFT: Companies -->
      <aside class="cp-sidebar">
        <div class="cp-sidebar-section">
          <h3>🏢 Companies</h3>
          <div id="cpCompanies"></div>
        </div>
        <div class="cp-q-list">
          <h3 style="margin-bottom:8px;">📋 Questions</h3>
          <div id="cpQuestionList"></div>
        </div>
      </aside>

      <!-- TOP: Filters -->
      <div class="cp-topbar">
        <div class="cp-filter-row">
          <span class="cp-filter-label">TOPIC</span>
          <div id="cpTopicFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>
        <div class="cp-filter-row">
          <span class="cp-filter-label">LEVEL</span>
          <div id="cpDifficultyFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>
      </div>

      <!-- QUESTION PANEL -->
      <section class="cp-question" id="cpQuestion"></section>

      <!-- EDITOR PANEL -->
      <section class="cp-editor-panel">
        <div class="cp-editor-toolbar">
          <div class="cp-editor-toolbar-left" id="cpStatus">
            <span class="badge badge-amber"><span class="badge-dot"></span> LOADING</span>
            <span>Starting SQLite…</span>
          </div>
          <div class="cp-editor-toolbar-right">
            <button class="btn btn-ghost btn-sm" id="cpReset">↺ Reset</button>
            <button class="btn btn-ghost btn-sm" id="cpShowSolution">👁️ Show Solution</button>
            <button class="btn btn-sm pgs-btn-run" id="cpRun">▶ Run</button>
            <button class="btn btn-sm pgs-btn-check" id="cpCheck">✓ Check Solution</button>
          </div>
        </div>

        <textarea id="cpEditor" spellcheck="false" placeholder="-- Write your SQL here&#10;SELECT ..."></textarea>

        <div class="pgs-solution" id="cpSolution" style="display:none;"></div>

        <div class="pgs-result-panel" id="cpResult">
          <div class="pgs-result-empty">
            <div class="pgs-result-empty-icon">▶</div>
            <p>Write your query and click <strong>Run</strong> or <strong>Check Solution</strong>.</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="toast-stack" id="toastStack"></div>

  <script src="assets/js/data/practice.js"></script>
  <script src="assets/js/data/company-questions.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/company-practice.js"></script>
</body>
