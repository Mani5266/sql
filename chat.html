<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn with SQLSENSEI · Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='monospace' font-size='52' font-weight='700' fill='%23000'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    body { overflow: hidden; }
    body::after { display: none; } /* No ambient glow inside the app */
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">SQ</span>
        <span>SQL<span class="brand-suffix">SENSEI</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="mindmap.html">Mind Map</a></li>
        <li><a href="curriculum.html">Curriculum</a></li>
        <li><a href="chat.html" class="active">Chat</a></li>
        <li><a href="playground.html">Playground</a></li>
        <li><a href="interview.html">Interview</a></li>
        <li><a href="patterns.html">Patterns</a></li>
        <li><a href="cheatsheet.html">Cheatsheet</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="chat-app">

      <!-- ====== Sidebar ====== -->
      <aside class="chat-sidebar" id="chatSidebar">
        <!-- Filled by chat.js -->
      </aside>

      <!-- ====== Main chat ====== -->
      <section class="chat-main">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="chat-avatar">SS</div>
            <div>
              <div class="chat-header-title" id="chatHeaderTitle">SQLSENSEI</div>
              <div class="chat-header-sub" id="chatHeaderSub">Initializing…</div>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="btn btn-ghost btn-sm" onclick="window.SENSEI.handleCommand('/status')">/status</button>
            <button class="btn btn-ghost btn-sm" onclick="window.SENSEI.handleCommand('/cheatsheet')">/cheatsheet</button>
            <a href="playground.html" class="btn btn-secondary btn-sm" target="_blank">▶ Playground</a>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- Filled by chat.js -->
        </div>

        <div class="chat-composer">
          <div class="composer-tabs">
            <button class="composer-tab active" data-mode="text">💬 Text / Answer</button>
            <button class="composer-tab" data-mode="sql">⌨ SQL Code</button>
          </div>
          <div class="composer-input-wrap">
            <textarea
              id="chatInput"
              placeholder="Type your answer, or use commands like /hint, /status, /quiz…"
              rows="1"
            ></textarea>
            <button class="send-btn" id="chatSend" aria-label="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
          <div class="composer-hint">
            <span><kbd>Enter</kbd> send · <kbd>Shift</kbd>+<kbd>Enter</kbd> newline</span>
            <span>Try: <code style="font-size:0.7rem;">/hint</code> <code style="font-size:0.7rem;">/quiz</code> <code style="font-size:0.7rem;">/cheatsheet</code></span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="toast-stack" id="toastStack"></div>

  <script src="assets/js/data/curriculum.js"></script>
  <script src="assets/js/data/lessons.js"></script>
  <script src="assets/js/progress.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/chat.js"></script>
</body>
</html>
